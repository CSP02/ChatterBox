<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" style="background-color: #030303">
  <defs>
    <linearGradient id="sg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>

    <linearGradient id="sg2">
      <stop offset="0%" stop-color="#FF7AD9"/>
      <stop offset="100%" stop-color="#FFB86C"/>
    </linearGradient>
  </defs>

  <!-- Expanding radial pulse -->
  <circle cx="200" cy="200" r="40" fill="url(#sg1)" opacity="0.15">
    <animate attributeName="r" values="40;80;40" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Spiral motion dots -->
  <circle r="6" fill="#00D4FF">
    <animateMotion dur="7s" repeatCount="indefinite"
      path="M200,200 m0,-70 a70,70 0 1,1 -0.1,0"/>
  </circle>

  <circle r="5" fill="#FF7AD9">
    <animateMotion dur="9s" repeatCount="indefinite"
      path="M200,200 m0,-110 a110,110 0 1,1 -0.1,0"/>
  </circle>

  <!-- Floating elements -->
  <circle cx="80" cy="300" r="10" fill="#FFB86C">
    <animate attributeName="cy" values="300;260;300" dur="6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="320" cy="100" r="8" fill="#6C63FF">
    <animate attributeName="cy" values="100;70;100" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Morphing blob -->
  <path fill="url(#sg2)" opacity="0.25">
    <animate attributeName="d" dur="10s" repeatCount="indefinite"
      values="
      M200,150 Q250,100 300,150 Q350,200 300,250 Q250,300 200,250 Q150,200 200,150 Z;
      M200,160 Q260,110 310,160 Q360,210 310,260 Q260,310 200,260 Q140,210 200,160 Z;
      M200,150 Q250,100 300,150 Q350,200 300,250 Q250,300 200,250 Q150,200 200,150 Z"/>
  </path>

  <!-- Rotating hexagon (growth vibe) -->
  <polygon points="200,80 220,100 220,130 200,150 180,130 180,100"
           fill="#00D4FF" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate"
      from="0 200 115" to="360 200 115" dur="14s" repeatCount="indefinite"/>
  </polygon>

  <!-- Subtle vertical lines -->
  <line x1="100" y1="0" x2="100" y2="400" stroke="#ffffff" opacity="0.04">
    <animate attributeName="x1" values="100;110;100" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="100;110;100" dur="8s" repeatCount="indefinite"/>
  </line>

  <line x1="300" y1="0" x2="300" y2="400" stroke="#ffffff" opacity="0.03">
    <animate attributeName="x1" values="300;290;300" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="300;290;300" dur="9s" repeatCount="indefinite"/>
  </line>

</svg>