<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - ChatterBox</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="../Resources/chatterbox_logo_transparent.png" type="image/png">
</head>
<body>

<nav>
    <a href="/">
        <img src="../Resources/chatterbox_logo_transparent.png" alt="logo">
    </a>
</nav>

<div class="signup-container">
    <div class="logo">
        <img src="../Resources/chatterbox_logo_transparent.png" alt="logo" style="height: 60px; margin-bottom: 1rem;">
    </div>
    
    <h2>Create Account</h2>
    <p class="subtitle">Join the ChatterBox community today</p>

    <div class="error" id="errorBox" style="display:none; color: #ff6b6b; margin-bottom: 1rem;"></div>

    <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Username" id="username_box">
    </div>

    <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="Email Address" id="email_box">
    </div>

    <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Password" id="password_box">
    </div>

    <button id="signup_button">
        <i class="fa-solid fa-user-plus"></i> Get Started
    </button>

    <p class="footer-text">
        Already have an account? <a href="../login">Login</a>
    </p>
</div>

<script type="module" src="./script.js"></script>
</body>
</html>
