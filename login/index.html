<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ChatterBox</title>
  <script src="./script.js" type="module"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="shortcut icon" href="../Resources/chatterbox_logo_transparent.png" type="image/png">

</head>

<body>

  <nav>
    <a href="/">
      <img src="../Resources/chatterbox_logo_transparent.png" alt="logo">
    </a>
  </nav>

  <div id="login">
    <div class="login-card">

      <div class="logo">
        <img src="../Resources/chatterbox_logo_transparent.png" alt="logo">
      </div>

      <h2>Welcome back</h2>
      <p class="subtitle">Login to continue chatting</p>

      <div class="error" id="errorBox">Invalid credentials</div>

      <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Username" id="username_box">
      </div>

      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Password" id="password_box">
      </div>

      <button id="login_button">
        <i class="fa-solid fa-right-to-bracket"></i> Login
      </button>

      <p class="footer-text">
        Don't have an account? <a href="../signup">Sign up</a>
      </p>

    </div>
  </div>

</body>

</html>
